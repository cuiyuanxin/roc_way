basePath: /
host: localhost:8080
info:
  contact: {}
  description: 基于 Go + Gin 的轻量级 Web 开发框架
  title: roc_way API
  version: "1.0"
paths:
  /healthz:
    get:
      description: 返回服务健康状态
      produces:
      - application/json
      responses:
        "200":
          description: status":"ok
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 健康检查
      tags:
      - Health
  /sse/notifications:
    get:
      description: 通过 Server-Sent Events 推送实时通知
      produces:
      - text/event-stream
      responses:
        "200":
          description: event-stream
          schema:
            type: string
      summary: SSE 实时通知
      tags:
      - Realtime
  /ws/chat:
    get:
      description: 通过 WebSocket 进行实时双向通信
      responses:
        "101":
          description: ' Switching Protocols'
          schema:
            type: string
      summary: WebSocket 聊天
      tags:
      - Realtime
swagger: "2.0"
